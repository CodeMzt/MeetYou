name: Feature request
description: Propose a capability, provider, workflow, or UX improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the expected behavior and main boundaries.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core runtime
        - Endpoint protocol
        - Desktop provider
        - Edge provider
        - External provider
        - Scheduler
        - Memory / Context
        - Delivery
        - UI
        - Documentation
  - type: textarea
    id: validation
    attributes:
      label: Validation idea
      description: What test or acceptance path would prove this works?
