name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example desktop-v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  windows-desktop:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: meetyou-ui/package-lock.json
      - name: Generate build fingerprints
        run: python scripts/generate_build_info.py
      - name: Build desktop backend
        shell: pwsh
        run: scripts\build-desktop-backend.ps1
      - name: Install frontend dependencies
        working-directory: meetyou-ui
        run: npm ci
      - name: Build Electron installer
        working-directory: meetyou-ui
        run: npm run build
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meetyou-windows-desktop
          path: meetyou-ui/release/**
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: MeetYou Desktop ${{ env.RELEASE_TAG }}
          files: meetyou-ui/release/**
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          fail_on_unmatched_files: true
