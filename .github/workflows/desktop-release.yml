name: Desktop Release

on:
  workflow_dispatch:

jobs:
  windows-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: meetyou-ui/package-lock.json
      - name: Generate build fingerprints
        run: python scripts/generate_build_info.py
      - name: Build desktop backend
        shell: pwsh
        run: scripts\build-desktop-backend.ps1
      - name: Install frontend dependencies
        working-directory: meetyou-ui
        run: npm ci
      - name: Build Electron installer
        working-directory: meetyou-ui
        run: npm run build
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meetyou-windows-desktop
          path: meetyou-ui/release/**
