name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-and-frontend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: meetyou-ui/package-lock.json
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-core.txt
          python -m pip install -r requirements-desktop-client.txt
          python -m pip install -r requirements-edge-client.txt
      - name: Prepare core runtime templates
        run: |
          cp user/config.example.json user/config.json
          cp user/tools.example.json user/tools.json
          cp user/cmd_policy.example.json user/cmd_policy.json
          cp user/source_catalog.example.json user/source_catalog.json
          cp user/memory_graph.example.json user/memory_graph.json
      - name: Run backend regression slice
        run: |
          python -m unittest \
            tests.test_runtime_entrypoints \
            tests.test_config_manager \
            tests.test_endpoint_tool_protocol \
            tests.test_endpoint_protocol_v4 \
            tests.test_tool_router_v4 \
            tests.test_delivery_v4 \
            tests.test_scheduler_v4 \
            tests.test_db_bootstrap \
            tests.test_gateway_config_api
      - name: Run full backend discovery on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Validate V4 acceptance runner imports
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: python -m py_compile scripts/v4_real_acceptance.py
      - name: Install frontend dependencies
        working-directory: meetyou-ui
        run: npm ci
      - name: Frontend typecheck
        working-directory: meetyou-ui
        run: npm run typecheck
      - name: Frontend tests
        working-directory: meetyou-ui
        run: npm run test
      - name: Frontend build on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: meetyou-ui
        run: npm run build
