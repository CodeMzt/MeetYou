services:
  postgres:
    image: postgres:16-alpine
    container_name: meetyou-postgres
    restart: unless-stopped
    env_file:
      - ./compose.env
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  core:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: meetyou-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
      - ./compose.env
      - ./runtime/core.env
    ports:
      - "${MEETYOU_GATEWAY_HOST_PORT:-8000}:8000"
    volumes:
      - ./runtime/user:/app/user
      - ./runtime/logs:/app/logs
      - ../../prompt:/app/prompt:ro

volumes:
  postgres-data:
